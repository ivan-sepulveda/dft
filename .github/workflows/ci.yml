name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dutyhunter

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: dutyhunter/.nvmrc
          cache: npm
          cache-dependency-path: dutyhunter/package-lock.json

      # Using `npm install` instead of `npm ci` here: @swc/core ships a
      # separate prebuilt binary package per platform, and each platform
      # variant can declare its own dependency version. A lock file
      # generated on macOS only fully resolves the darwin binary's deps,
      # not Linux's — so `npm ci` fails on this Ubuntu runner even right
      # after a clean local `npm install`. `npm install` re-resolves
      # instead of demanding an exact match to the (incomplete) lock file.
      - run: npm install

      - run: npm run format:check

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
